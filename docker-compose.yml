services:
  migrator:
    build:
      context: .
      target: migrator
    environment:
      - SECRETS_BASE_URL=${SECRETS_BASE_URL}
      - SECRETS_ENVIRONMENT_ID=${SECRETS_ENVIRONMENT_ID}
      - SECRETS_PRIVATE_KEY=${SECRETS_PRIVATE_KEY}
    restart: "no"

  backend:
    build:
      context: .
      target: production
    environment:
      - SECRETS_BASE_URL=${SECRETS_BASE_URL}
      - SECRETS_ENVIRONMENT_ID=${SECRETS_ENVIRONMENT_ID}
      - SECRETS_PRIVATE_KEY=${SECRETS_PRIVATE_KEY}
    depends_on:
      migrator:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/ingest').then(r=>process.exit(r.status<500?0:1)).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  worker-deployer:
    build:
      context: .
      target: worker-deployer
    environment:
      - SECRETS_BASE_URL=${SECRETS_BASE_URL}
      - SECRETS_ENVIRONMENT_ID=${SECRETS_ENVIRONMENT_ID}
      - SECRETS_PRIVATE_KEY=${SECRETS_PRIVATE_KEY}
      - CLOUDFLARE_API_TOKEN=${CLOUDFLARE_API_TOKEN}
      - CLOUDFLARE_ACCOUNT_ID=${CLOUDFLARE_ACCOUNT_ID}
      - INGEST_URL=${INGEST_URL}
    depends_on:
      backend:
        condition: service_healthy
    restart: "no"
